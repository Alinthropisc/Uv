[graph]
targets = []

[advisories]
ignore = [
    # rustls-webpki — transitive dep via hickory-resolver, can't update directly yet
    "RUSTSEC-2026-0098",
    "RUSTSEC-2026-0099",
    "RUSTSEC-2026-0104",
    # hickory-proto — pinned by hickory-resolver, no patched version available in tree yet
    "RUSTSEC-2026-0119",
    # ansi_term — unmaintained, used by clap 2.x; no code path vulnerable
    "RUSTSEC-2021-0139",
    # async-std — discontinued; used indirectly, no replacement yet
    "RUSTSEC-2025-0052",
    # rustls-pemfile — unmaintained wrapper; transitively pulled, no breaking issues
    "RUSTSEC-2025-0134",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "CC0-1.0",
    "0BSD",
    "Zlib",
    "OpenSSL",
    "MPL-2.0",
    "GPL-3.0-only",
]
# Allow packages whose license can't be determined (rare, review manually)
confidence-threshold = 0.8

[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[bans]
multiple-versions = "warn"
wildcards = "allow"
deny = []

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
